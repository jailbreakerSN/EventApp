# Firebase App Hosting configuration for the backoffice web app (Next.js 15)
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Start at 0 to avoid cost, scale up on demand
  minInstances: 0
  maxInstances: 5
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables available at build and runtime.
# NEXT_PUBLIC_* vars are embedded in the client bundle at build time.
# The Firebase Web SDK config values are public (visible in every client
# bundle on inspect), so hardcoding is safe.
env:
  # ─── Firebase Web SDK (public client-side config) ─────────────────────
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyBq_HtTysOank3j9X6QROE9oPUKyHZyTFw"
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "teranga-app-990a8.firebaseapp.com"
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "teranga-app-990a8"
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "teranga-app-990a8.firebasestorage.app"
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "784468934140"
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:784468934140:web:ceff0f6ed59860582c8679"
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-WRYLWVCP35"
    availability: [BUILD, RUNTIME]

  # ─── API URL ──────────────────────────────────────────────────────────
  # Points to the Cloud Run API deployed by the GitHub Actions pipeline.
  - variable: NEXT_PUBLIC_API_URL
    value: "https://teranga-api-staging-784468934140.europe-west1.run.app"
    availability: [BUILD, RUNTIME]
