name: teranga
description: "Teranga - L'Événementiel Africain, Connecté et Mémorable"
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.4
  firebase_storage: ^12.3.7
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.6
  firebase_crashlytics: ^4.1.5
  firebase_performance: ^0.10.0+9

  # ─── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ─── Navigation ───────────────────────────────────────────────────────────
  go_router: ^14.6.2

  # ─── Local Storage (Offline) ──────────────────────────────────────────────
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ─── QR Code ──────────────────────────────────────────────────────────────
  mobile_scanner: ^6.0.2      # QR camera scanner (staff app)
  qr_flutter: ^4.1.0          # Display QR badge

  # ─── HTTP / API ───────────────────────────────────────────────────────────
  dio: ^5.7.0
  retrofit: ^4.4.1

  # ─── UI ───────────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  gap: ^3.0.1
  intl: ^0.19.0
  timeago: ^3.7.0

  # ─── Notifications ────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.4

  # ─── Permissions ──────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ─── Utilities ────────────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1   # detect offline state
  crypto: ^3.0.6               # QR HMAC verification

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.1.5
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true  # enables l10n auto-generation

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # Fonts — download Inter from https://fonts.google.com/specimen/Inter
  # and place .ttf files in assets/fonts/ before uncommenting:
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
