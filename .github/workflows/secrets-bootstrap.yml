name: Secrets Bootstrap (GCP Secret Manager)

# One-shot ops workflow that promotes runtime secrets from
# GitHub Secrets (CI/CD source of truth) to GCP Secret Manager
# (Cloud Run runtime source of truth). After running:
#
#   - Each secret exists as a versioned entry in Secret Manager.
#   - The Cloud Run runtime SA holds `roles/secretmanager.secretAccessor`
#     on each secret (and ONLY each secret — no project-wide grant).
#   - The API Cloud Run service has `--update-secrets="VAR=NAME:latest"`
#     bindings, so `process.env.VAR` resolves at instance start without
#     the value ever appearing in `gcloud run services describe` output.
#
# What this fixes
# ───────────────
# Before this workflow, six runtime secrets (QR_SECRET, WEBHOOK_SECRET,
# RESEND_API_KEY, PAYDUNYA_MASTER_KEY, PAYDUNYA_PRIVATE_KEY,
# PAYDUNYA_TOKEN) were injected via `gcloud run deploy --set-env-vars`
# at deploy time, which stored their plaintext values on the Cloud Run
# service config. Anyone with `roles/run.viewer` could read them via
# `gcloud run services describe`. With this workflow, only callers with
# `roles/secretmanager.secretAccessor` on each individual secret can
# read the value — the Cloud Run service config carries only references
# (`secretKeyRef: NAME:latest`).
#
# Cf. ADR-0016 (Runtime secrets via GCP Secret Manager).
#
# Idempotency: every step is safe to re-run. New secret versions are
# only appended when the value differs from the latest stored version.
# IAM bindings use `add-iam-policy-binding` which is no-op on duplicate.
# Cloud Run `--update-secrets` is idempotent on `:latest`.
#
# Trigger: manual (`workflow_dispatch`). Required reviewers can be
# added on the `production` environment via Settings → Environments.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: "Preview changes without applying (true = read-only)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  # Don't run two ops workflows against the same env at once.
  group: secrets-bootstrap-${{ inputs.environment }}
  cancel-in-progress: false

env:
  REGION: europe-west1
  # Cloud Run service that consumes these secrets at runtime. Match
  # the names created by deploy-staging.yml / future deploy-production.
  API_SERVICE_NAME: teranga-api-${{ inputs.environment }}

permissions:
  contents: read

jobs:
  # ─── Plan ────────────────────────────────────────────────────────────────
  # Validates inputs and prints a one-shot summary on the GitHub Actions
  # job log. Fails fast if GCP_SA_KEY is missing on the target environment.
  plan:
    name: Plan (audit + summary)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      project_id: ${{ steps.summary.outputs.project_id }}
    steps:
      - name: Summarise planned actions
        id: summary
        env:
          SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SA_KEY:-}" ]; then
            echo "::error::GCP_SA_KEY is missing on environment '${{ inputs.environment }}'."
            echo "::error::Add it under Settings → Environments → ${{ inputs.environment }} → Environment secrets."
            exit 1
          fi
          PROJECT_ID=$(echo "$SA_KEY" | jq -r '.project_id')
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "::error::GCP_SA_KEY does not contain a project_id field."
            exit 1
          fi
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

          {
            echo "# Secrets bootstrap plan"
            echo
            echo "- Environment: **${{ inputs.environment }}**"
            echo "- GCP project: **$PROJECT_ID**"
            echo "- Region: **$REGION**"
            echo "- Cloud Run service: **$API_SERVICE_NAME**"
            echo "- Dry-run: **${{ inputs.dry_run }}**"
            echo
            echo "## Secrets to provision (6)"
            echo
            echo "| Secret name | Source GitHub Secret | Sensitivity |"
            echo "| --- | --- | --- |"
            echo "| QR_SECRET | secrets.QR_SECRET | HIGH (HMAC for QR badge signing) |"
            echo "| WEBHOOK_SECRET | secrets.WEBHOOK_SECRET | MED (mock webhook HMAC + prod fallback) |"
            echo "| RESEND_API_KEY | secrets.RESEND_API_KEY | HIGH (Resend API auth) |"
            echo "| PAYDUNYA_MASTER_KEY | secrets.PAYDUNYA_MASTER_KEY | CRITICAL (PayDunya merchant id + webhook signing) |"
            echo "| PAYDUNYA_PRIVATE_KEY | secrets.PAYDUNYA_PRIVATE_KEY | CRITICAL (PayDunya server-to-server auth) |"
            echo "| PAYDUNYA_TOKEN | secrets.PAYDUNYA_TOKEN | CRITICAL (PayDunya sensitive ops header) |"
            echo
            echo "## Cloud Run env-var aliases"
            echo
            echo "PAYMENT_WEBHOOK_SECRET (read by payment.service.ts) is bound to the SAME secret as WEBHOOK_SECRET so a single rotation updates both code paths."
            echo
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "> **Dry-run mode** — no changes will be applied. Re-run with \`dry_run=false\` to execute."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Provision Secret Manager entries + IAM ──────────────────────────────
  # Loops over the 6 runtime secrets:
  #   1. Ensure secret exists (create if missing, automatic replication).
  #   2. Add a new version IF the latest stored value differs from the
  #      current GitHub Secret value (avoids version churn).
  #   3. Grant `roles/secretmanager.secretAccessor` to the Cloud Run
  #      runtime SA on each secret. Per-secret bindings (NOT project-
  #      wide) so a future SA scope-down doesn't lose access piecemeal.
  #
  # The Cloud Run runtime SA is the project's default compute SA
  # (<project_number>-compute@developer.gserviceaccount.com) unless
  # the service has been re-deployed with `--service-account`. We
  # also grant the same SA to keep parity with the notification-ops
  # workflow that already binds INTERNAL_DISPATCH_SECRET to it.
  provision-secrets:
    name: Provision Secret Manager entries + IAM
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{ inputs.environment }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Secret Manager API is enabled
        run: |
          set -euo pipefail
          gcloud services enable secretmanager.googleapis.com \
            --project="${{ needs.plan.outputs.project_id }}" \
            --quiet

      - name: Provision each secret + bind IAM
        if: ${{ inputs.dry_run == 'false' }}
        env:
          PROJECT_ID: ${{ needs.plan.outputs.project_id }}
          # Each secret value is read from GitHub Environment secrets.
          # Empty values cause the step to fail explicitly so the
          # operator gets a clear "you forgot to add X" message.
          QR_SECRET: ${{ secrets.QR_SECRET }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PAYDUNYA_MASTER_KEY: ${{ secrets.PAYDUNYA_MASTER_KEY }}
          PAYDUNYA_PRIVATE_KEY: ${{ secrets.PAYDUNYA_PRIVATE_KEY }}
          PAYDUNYA_TOKEN: ${{ secrets.PAYDUNYA_TOKEN }}
        run: |
          set -euo pipefail

          PROJECT_NUMBER=$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')
          # Cloud Run runtime SA. Default for services deployed without
          # --service-account override; matches notification-ops-prereqs.
          CLOUD_RUN_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          # The 6 secret names. Same order as the plan summary table.
          SECRETS=(
            "QR_SECRET"
            "WEBHOOK_SECRET"
            "RESEND_API_KEY"
            "PAYDUNYA_MASTER_KEY"
            "PAYDUNYA_PRIVATE_KEY"
            "PAYDUNYA_TOKEN"
          )

          for NAME in "${SECRETS[@]}"; do
            DESIRED_VALUE="${!NAME:-}"
            if [ -z "$DESIRED_VALUE" ]; then
              echo "::error::GitHub Secret $NAME is empty or missing on environment '${{ inputs.environment }}'."
              echo "::error::Add it under Settings → Environments → ${{ inputs.environment }} → Environment secrets."
              exit 1
            fi

            echo "::group::$NAME"

            # ── 1. Create the secret if it doesn't exist yet ─────────────
            if ! gcloud secrets describe "$NAME" \
                --project="$PROJECT_ID" >/dev/null 2>&1; then
              echo "::notice::Creating secret $NAME"
              gcloud secrets create "$NAME" \
                --project="$PROJECT_ID" \
                --replication-policy=automatic \
                --quiet
            else
              echo "::notice::Secret $NAME already exists"
            fi

            # ── 2. Add a new version IF different from the latest ────────
            # Skips version churn when the GitHub Secret hasn't changed.
            CURRENT=$(gcloud secrets versions access latest \
              --secret="$NAME" \
              --project="$PROJECT_ID" 2>/dev/null || echo "")

            if [ "$CURRENT" = "$DESIRED_VALUE" ]; then
              echo "::notice::$NAME: latest version matches GitHub Secret — skipping add"
            else
              printf '%s' "$DESIRED_VALUE" | gcloud secrets versions add "$NAME" \
                --project="$PROJECT_ID" \
                --data-file=- \
                --quiet >/dev/null
              echo "::notice::$NAME: new version appended"
            fi

            # ── 3. Grant per-secret accessor to the Cloud Run runtime SA ──
            # Idempotent — `add-iam-policy-binding` is no-op when the
            # binding already exists.
            gcloud secrets add-iam-policy-binding "$NAME" \
              --project="$PROJECT_ID" \
              --member="serviceAccount:$CLOUD_RUN_SA" \
              --role=roles/secretmanager.secretAccessor \
              --condition=None \
              --quiet >/dev/null || \
              echo "::warning::Could not grant accessor on $NAME to $CLOUD_RUN_SA"

            echo "::endgroup::"
          done

      - name: Dry-run summary
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          {
            echo "### Dry-run — would have:"
            echo "1. Created/updated 6 Secret Manager entries: QR_SECRET, WEBHOOK_SECRET, RESEND_API_KEY, PAYDUNYA_MASTER_KEY, PAYDUNYA_PRIVATE_KEY, PAYDUNYA_TOKEN."
            echo "2. Granted \`roles/secretmanager.secretAccessor\` to the Cloud Run runtime SA on each secret."
            echo
            echo "Re-run with \`dry_run=false\` to apply."
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Bind secrets to Cloud Run service ───────────────────────────────────
  # `gcloud run services update --update-secrets` adds env-var-from-secret
  # bindings to the existing service. The `--set-secrets` flag would
  # REPLACE all existing bindings (e.g. `INTERNAL_DISPATCH_SECRET` from
  # notification-ops-prereqs would be lost), hence `--update-secrets`.
  #
  # The Cloud Run service must already exist when this job runs — the
  # initial deploy is owned by deploy-staging.yml. Re-running this
  # workflow against a fresh project (no service yet) emits a warning
  # and exits 0 so the operator can deploy first then re-run.
  #
  # Cloud Run env-var aliasing — PAYMENT_WEBHOOK_SECRET is bound to
  # the SAME WEBHOOK_SECRET secret because:
  #   - apps/api/src/config/index.ts reads `process.env.WEBHOOK_SECRET`
  #     (validated via Zod, min 16 chars)
  #   - apps/api/src/services/payment.service.ts reads
  #     `process.env.PAYMENT_WEBHOOK_SECRET` directly
  # Both code paths converge on the same secret without duplicating
  # the GH Secrets / Secret Manager entry.
  bind-cloud-run:
    name: Bind secrets to Cloud Run service
    runs-on: ubuntu-latest
    needs: [plan, provision-secrets]
    if: ${{ inputs.dry_run == 'false' }}
    environment: ${{ inputs.environment }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Verify Cloud Run service exists
        id: check
        env:
          PROJECT_ID: ${{ needs.plan.outputs.project_id }}
        run: |
          set -euo pipefail
          if gcloud run services describe "$API_SERVICE_NAME" \
              --region="$REGION" \
              --project="$PROJECT_ID" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloud Run service $API_SERVICE_NAME does not exist yet."
            echo "::warning::Run deploy-staging.yml first, then re-run this workflow."
          fi

      - name: Update Cloud Run service with secret bindings
        if: ${{ steps.check.outputs.exists == 'true' }}
        env:
          PROJECT_ID: ${{ needs.plan.outputs.project_id }}
        run: |
          set -euo pipefail
          # Cloud Run rejects a service revision where the SAME env var
          # name appears in both plain env vars (`--set-env-vars`) AND
          # secret bindings (`--update-secrets`). The pre-migration
          # state has these names as plain env vars (injected by
          # deploy-staging.yml `--set-env-vars`). To migrate atomically,
          # we run `--remove-env-vars` and `--update-secrets` in the
          # SAME `gcloud run services update` call — both flags are
          # applied to one revision, so there's no intermediate config
          # where the var is missing entirely.
          #
          # `--update-secrets` (NOT --set-secrets) merges with existing
          # bindings — so `INTERNAL_DISPATCH_SECRET` from notification-
          # ops-prereqs.yml stays in place. Each entry is
          # `ENV_VAR=SECRET_NAME:VERSION`. We use `:latest` so a
          # rotation (new version added by the provision-secrets job)
          # is picked up at the next instance restart without touching
          # the binding.
          #
          # Aliases: PAYMENT_WEBHOOK_SECRET → same backing secret as
          # WEBHOOK_SECRET. See top-of-job comment for rationale.
          #
          # Re-runs of this workflow are safe: --remove-env-vars on a
          # name that isn't a plain env var is a no-op; --update-secrets
          # on a binding that already exists is a no-op.
          REMOVE_VARS="QR_SECRET,WEBHOOK_SECRET,PAYMENT_WEBHOOK_SECRET,RESEND_API_KEY,PAYDUNYA_MASTER_KEY,PAYDUNYA_PRIVATE_KEY,PAYDUNYA_TOKEN"
          BIND_SECRETS="QR_SECRET=QR_SECRET:latest,WEBHOOK_SECRET=WEBHOOK_SECRET:latest,PAYMENT_WEBHOOK_SECRET=WEBHOOK_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,PAYDUNYA_MASTER_KEY=PAYDUNYA_MASTER_KEY:latest,PAYDUNYA_PRIVATE_KEY=PAYDUNYA_PRIVATE_KEY:latest,PAYDUNYA_TOKEN=PAYDUNYA_TOKEN:latest"

          gcloud run services update "$API_SERVICE_NAME" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --remove-env-vars="$REMOVE_VARS" \
            --update-secrets="$BIND_SECRETS" \
            --quiet

          {
            echo "### Cloud Run service updated"
            echo
            echo "\`$API_SERVICE_NAME\` now reads the following env vars from Secret Manager:"
            echo
            echo "| Cloud Run env var | Secret Manager source |"
            echo "| --- | --- |"
            echo "| QR_SECRET | QR_SECRET:latest |"
            echo "| WEBHOOK_SECRET | WEBHOOK_SECRET:latest |"
            echo "| PAYMENT_WEBHOOK_SECRET | WEBHOOK_SECRET:latest (alias) |"
            echo "| RESEND_API_KEY | RESEND_API_KEY:latest |"
            echo "| PAYDUNYA_MASTER_KEY | PAYDUNYA_MASTER_KEY:latest |"
            echo "| PAYDUNYA_PRIVATE_KEY | PAYDUNYA_PRIVATE_KEY:latest |"
            echo "| PAYDUNYA_TOKEN | PAYDUNYA_TOKEN:latest |"
            echo
            echo "Verify: \`gcloud run services describe $API_SERVICE_NAME --region=$REGION --format='get(spec.template.spec.containers[0].env[*])'\`"
            echo
            echo "Plaintext values no longer appear on the service config — only \`secretKeyRef\` entries."
          } >> "$GITHUB_STEP_SUMMARY"
