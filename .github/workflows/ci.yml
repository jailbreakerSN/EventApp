name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Aligned to Node 22 across all workspaces:
  #   - apps/functions pins engines.node = "22" (required for Firebase
  #     Functions v2 runtime), so running CI on anything else emits
  #     EBADENGINE warnings on every `npm ci`.
  #   - web-backoffice + web-participant Dockerfiles use node:22-alpine.
  #   - apps/api Dockerfile was bumped to node:22-alpine in this commit.
  # Keeping everything on one major removes drift and removes the warning
  # noise from CI logs.
  NODE_VERSION: "22"
  FLUTTER_VERSION: "3.27.x"
  # Harden npm against transient GitHub Actions → registry network flakes
  # (e.g. ECONNRESET mid-`npm ci`). Retries up to 5 times with exponential
  # backoff; defaults are only 2 retries which is routinely insufficient
  # for a ~1,300-package install over a shaky connection.
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "10000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"

jobs:
  # ─── Shared Types (must build first — other packages depend on it) ───────
  shared-types:
    name: Build shared-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-shared-types-${{ runner.os }}-${{ hashFiles('packages/shared-types/src/**', 'packages/shared-types/package.json') }}
          restore-keys: turbo-shared-types-${{ runner.os }}-
      - run: npx turbo build --filter=@teranga/shared-types
      - uses: actions/upload-artifact@v4
        with:
          name: shared-types-dist
          path: packages/shared-types/dist
          retention-days: 1

  # ─── API: Lint & Type-check ──────────────────────────────────────────────
  api-lint:
    name: "API: Lint & Type-check"
    runs-on: ubuntu-latest
    needs: shared-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: shared-types-dist
          path: packages/shared-types/dist
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-api-lint-${{ runner.os }}-${{ hashFiles('apps/api/src/**', 'apps/api/package.json') }}
          restore-keys: turbo-api-lint-${{ runner.os }}-
      - name: Lint
        run: npx eslint apps/api/src/ --max-warnings 0
      - name: Type-check
        run: npm run type-check --workspace=apps/api

  # ─── API: Tests ──────────────────────────────────────────────────────────
  api-test:
    name: "API: Tests"
    runs-on: ubuntu-latest
    needs: shared-types
    env:
      NODE_ENV: test
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: silent
      FIREBASE_PROJECT_ID: teranga-events-test
      FIREBASE_STORAGE_BUCKET: teranga-events-test.appspot.com
      GOOGLE_APPLICATION_CREDENTIALS: ""
      CORS_ORIGINS: "http://localhost:3001"
      RATE_LIMIT_MAX: "1000"
      RATE_LIMIT_WINDOW_MS: "60000"
      QR_SECRET: ci-test-secret-minimum-16-chars
      RESEND_API_KEY: re_test_placeholder
      EMAIL_FROM: test@teranga.events
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: shared-types-dist
          path: packages/shared-types/dist
      - name: Run tests
        run: npm run test --workspace=apps/api
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage
          retention-days: 7
          if-no-files-found: ignore

  # ─── API: Integration Tests (Firestore emulator) ────────────────────────
  # Runs the emulator-driven integration suite at
  # apps/api/src/__tests__/integration/. Boots the Firestore emulator via
  # `firebase emulators:exec` so transactions, queries, and denormalization
  # are exercised against the real Firestore admin SDK — no mocks.
  #
  # Kept separate from `api-test` because:
  #   - The emulator adds ~10s startup overhead per run.
  #   - It requires Java (bundled with the Firebase emulator) + firebase-tools.
  #   - Contributors running `npm test` locally should not need a running
  #     emulator; this job covers the end-to-end path in CI only.
  api-integration-test:
    name: "API: Integration (Firestore emulator)"
    runs-on: ubuntu-latest
    needs: shared-types
    env:
      # The API config schema only accepts development | staging | production.
      # NODE_ENV=test would crash the API's env validation at import time.
      # The integration setup pins this to "development" but we keep it
      # explicit here too for visibility.
      NODE_ENV: development
      FIREBASE_PROJECT_ID: teranga-integration-test
      FIREBASE_STORAGE_BUCKET: teranga-integration-test.appspot.com
      GOOGLE_APPLICATION_CREDENTIALS: ""
      CORS_ORIGINS: "http://localhost:3001"
      QR_SECRET: ci-integration-secret-minimum-32-chars-long-ok
      LOG_LEVEL: silent
      # firebase emulators:exec reads this to avoid any accidental Sentry
      # or telemetry calls.
      FIREBASE_CLI_PREVIEWS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      # Firebase emulator bundles require a JRE. actions/setup-java is the
      # canonical source.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: shared-types-dist
          path: packages/shared-types/dist
      - name: Install firebase-tools
        run: npm install -g firebase-tools@13
      - name: Run integration tests against Firestore + Auth emulators
        run: |
          firebase emulators:exec \
            --only firestore,auth \
            --project teranga-integration-test \
            "npm run test:integration --workspace=apps/api"

  # ─── Dependency Audit ────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --audit-level=critical --omit=dev
        # Fails on critical vulnerabilities. High-severity issues are logged
        # but don't block CI to allow for transitive deps without fixes yet.
      - name: Audit high-severity (warn only)
        run: npm audit --audit-level=high --omit=dev || echo "::warning::High-severity vulnerabilities found — review npm audit output"

  # ─── Cloud Functions ─────────────────────────────────────────────────────
  functions:
    name: Functions
    runs-on: ubuntu-latest
    needs: shared-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: shared-types-dist
          path: packages/shared-types/dist
      - run: npm run type-check --workspace=apps/functions
      - run: npm run build --workspace=apps/functions

  # ─── Web Backoffice ──────────────────────────────────────────────────────
  web-backoffice:
    name: Web Backoffice
    runs-on: ubuntu-latest
    needs: shared-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: shared-types-dist
          path: packages/shared-types/dist
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/turbo
            apps/web-backoffice/.next/cache
          key: turbo-web-${{ runner.os }}-${{ hashFiles('apps/web-backoffice/src/**', 'apps/web-backoffice/package.json') }}
          restore-keys: turbo-web-${{ runner.os }}-
      - name: Lint
        run: npx eslint apps/web-backoffice/src/
      - name: Type-check
        run: npm run type-check --workspace=apps/web-backoffice
      - name: Build
        run: npm run build --workspace=apps/web-backoffice
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: teranga-events-dev
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: teranga-events-dev.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: teranga-events-dev.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ─── Web Participant ─────────────────────────────────────────────────────
  web-participant:
    name: Web Participant
    runs-on: ubuntu-latest
    needs: shared-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: shared-types-dist
          path: packages/shared-types/dist
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/turbo
            apps/web-participant/.next/cache
          key: turbo-participant-${{ runner.os }}-${{ hashFiles('apps/web-participant/src/**', 'apps/web-participant/package.json') }}
          restore-keys: turbo-participant-${{ runner.os }}-
      - name: Lint
        run: npx eslint apps/web-participant/src/
      - name: Type-check
        run: npm run type-check --workspace=apps/web-participant
      - name: Build
        run: npm run build --workspace=apps/web-participant
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: teranga-events-dev
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: teranga-events-dev.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: teranga-events-dev.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3002
          NEXT_PUBLIC_BACKOFFICE_URL: http://localhost:3001

  # ─── Flutter Mobile ──────────────────────────────────────────────────────
  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Generate code (Riverpod, Freezed, etc.)
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Run analyzer
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos
      - name: Run tests
        working-directory: apps/mobile
        run: flutter test --no-pub

  # ─── Firestore Index Coverage ────────────────────────────────────────────
  # Static analysis of every `.where()` / `.orderBy()` pattern in
  # repositories and Cloud Function triggers. Fails the build if any query
  # lacks a matching composite index in firestore.indexes.json. Prevents
  # the class of `FAILED_PRECONDITION: The query requires an index` 500s
  # that have bitten us in staging. See scripts/audit-firestore-indexes.ts.
  firestore-indexes:
    name: Firestore Index Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Audit Firestore index coverage
        run: npm run audit:firestore-indexes

  # ─── Firestore Rules Validation ──────────────────────────────────────────
  firebase-rules:
    name: Firebase Rules (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install -g firebase-tools@13
      - run: firebase emulators:exec "echo 'Rules loaded successfully'" --only firestore --project teranga-events-dev

  # ─── CI Gate (all required checks must pass) ─────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        api-lint,
        api-test,
        api-integration-test,
        functions,
        web-backoffice,
        web-participant,
        flutter,
        firebase-rules,
        firestore-indexes,
      ]
    steps:
      - name: Check results
        run: |
          failed=""
          for job in api-lint api-test api-integration-test functions web-backoffice web-participant flutter firebase-rules firestore-indexes; do
            result="${{ needs.api-lint.result }}"
            case "$job" in
              api-lint)              result="${{ needs.api-lint.result }}" ;;
              api-test)              result="${{ needs.api-test.result }}" ;;
              api-integration-test)  result="${{ needs.api-integration-test.result }}" ;;
              functions)             result="${{ needs.functions.result }}" ;;
              web-backoffice)        result="${{ needs.web-backoffice.result }}" ;;
              web-participant)       result="${{ needs.web-participant.result }}" ;;
              flutter)               result="${{ needs.flutter.result }}" ;;
              firebase-rules)        result="${{ needs.firebase-rules.result }}" ;;
              firestore-indexes)     result="${{ needs.firestore-indexes.result }}" ;;
            esac
            if [[ "$result" == "failure" ]]; then
              echo "::error::Job '$job' failed"
              failed="$failed $job"
            fi
          done
          if [[ -n "$failed" ]]; then
            echo "Failed jobs:$failed"
            exit 1
          fi
          echo "All required checks passed"
