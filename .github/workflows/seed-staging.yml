name: Seed staging (manual reset + re-seed)

# One-shot workflow to blow away the staging Firestore and re-seed it from
# scratch with the latest fixture set. Deliberately isolated from the daily
# `deploy-staging.yml` seed step — that step is idempotent and safe to run
# on every push, whereas this one is destructive and must be invoked
# explicitly by a human.
#
# Safety rails (all five MUST align or the workflow aborts):
#   1. `workflow_dispatch` only — no push / schedule triggers.
#   2. A typed confirmation input: the operator must spell out the exact
#      string `RESET_AND_SEED_STAGING` to proceed.
#   3. The `staging` environment gate — GitHub will require reviewer
#      approval per environment protection rules (configure in repo
#      Settings → Environments if not already enabled).
#   4. The seed scripts themselves double-check the project id against
#      the allow-list in scripts/seed/config.ts (production is NOT in
#      the allow-list) and refuse any reset that doesn't set
#      SEED_RESET_CONFIRM=YES_RESET + CONFIRM_PROJECT=<project-id>.
#   5. seed-reset.ts gate 3b — non-emulator targets additionally require
#      CONFIRM_PHRASE="RESET STAGING DATABASE NOW" (Sprint E hardening).
#      Documented in docs-v2/50-operations/staging-reset.md.
#
# Usage: Actions → "Seed staging (manual reset + re-seed)" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET_AND_SEED_STAGING to confirm (destructive — wipes staging Firestore)'
        required: true
        type: string
      reset:
        description: 'Reset Firestore before seeding (uncheck to skip the wipe and only re-run the seed upserts)'
        required: true
        type: boolean
        default: true

concurrency:
  group: seed-staging
  # Cancel any in-flight reset+seed when a second one is triggered. With
  # `false` the second run queues behind the first, which means the seed
  # step of run 2 starts writing while run 1's deletion loop is still
  # running — leaving the database in an inconsistent half-deleted /
  # half-seeded state. Cancelling in flight is the safer default for a
  # destructive operation.
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NPM_CONFIG_FETCH_RETRIES: '5'
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '10000'
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '120000'

jobs:
  # ─── Gate 1: verify the typed confirmation string ────────────────────────
  # Runs without any cloud credentials so an attempt with the wrong
  # confirmation never even authenticates to GCP.
  verify-confirmation:
    name: Verify confirmation string
    runs-on: ubuntu-latest
    steps:
      - name: Check input
        # Do NOT echo the actual `inputs.confirm` value in any failure
        # path — operators occasionally type adjacent secrets / passwords
        # into the wrong field, and Actions logs are retained. The error
        # message intentionally states only the expected string.
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "RESET_AND_SEED_STAGING" ]; then
            echo "::error::confirm input must be exactly 'RESET_AND_SEED_STAGING'"
            exit 1
          fi
          echo "✓ Confirmation string matches."

  # ─── Gate 2: environment-protected discovery of project id + bucket ──────
  setup:
    name: Discover staging project id and storage bucket
    runs-on: ubuntu-latest
    needs: verify-confirmation
    environment: staging
    outputs:
      project_id: ${{ steps.discover.outputs.project_id }}
      firebase_storage_bucket: ${{ steps.discover.outputs.firebase_storage_bucket }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - id: discover
        run: |
          set -euo pipefail

          PROJECT_ID=$(gcloud config get-value project)
          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "Staging project: ${PROJECT_ID}"
          if [ "${PROJECT_ID}" != "teranga-app-990a8" ]; then
            echo "::error::Refusing to run: derived project id '${PROJECT_ID}' is not 'teranga-app-990a8'."
            exit 1
          fi

          # Discover the actual storage bucket via the Firebase Management
          # API (same source of truth deploy-staging.yml uses). New Firebase
          # projects default to <project>.firebasestorage.app; legacy
          # projects use <project>.appspot.com. Querying the API means we
          # don't have to hardcode either convention — moving to a new
          # project just works. seed-reset.ts also probes both names as a
          # fallback if this lookup ever returns empty.
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          BUCKET=""
          WEB_APPS=$(curl -sf -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://firebase.googleapis.com/v1beta1/projects/$PROJECT_ID/webApps" || echo '{}')
          APP_ID=$(echo "$WEB_APPS" | jq -r '.apps[0].appId // empty')
          if [ -n "$APP_ID" ]; then
            CONFIG=$(curl -sf -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://firebase.googleapis.com/v1beta1/projects/$PROJECT_ID/webApps/$APP_ID/config" || echo '{}')
            BUCKET=$(echo "$CONFIG" | jq -r '.storageBucket // empty')
          fi

          echo "firebase_storage_bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          if [ -n "$BUCKET" ]; then
            echo "Discovered storage bucket: ${BUCKET}"
          else
            echo "::warning::Could not discover storage bucket via Firebase Management API; seed-reset.ts will probe candidate bucket names at runtime."
          fi

  # ─── Reset Firestore (opt-in, default true) ──────────────────────────────
  reset:
    name: Reset staging Firestore
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ inputs.reset }}
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build shared-types
        run: npx turbo build --filter=@teranga/shared-types
      - name: Run reset script
        # Gate 3b (non-emulator) requires CONFIRM_PHRASE — see seed-reset.ts
        # and docs-v2/50-operations/staging-reset.md. Without it the script
        # throws before any Firestore / Auth / Storage write.
        # FIREBASE_STORAGE_BUCKET is sourced from the Firebase Management
        # API in setup; if that lookup returned empty, the script probes
        # both the new (firebasestorage.app) and legacy (appspot.com)
        # bucket conventions and uses whichever exists.
        env:
          SEED_TARGET: staging
          FIREBASE_PROJECT_ID: ${{ needs.setup.outputs.project_id }}
          FIREBASE_STORAGE_BUCKET: ${{ needs.setup.outputs.firebase_storage_bucket }}
          SEED_RESET_CONFIRM: YES_RESET
          CONFIRM_PROJECT: ${{ needs.setup.outputs.project_id }}
          CONFIRM_PHRASE: 'RESET STAGING DATABASE NOW'
        run: npx tsx scripts/seed-reset.ts

  # ─── Re-seed (always runs; depends on reset when reset was requested) ────
  seed:
    name: Re-seed staging database
    runs-on: ubuntu-latest
    needs: [setup, reset]
    # `always() && needs.setup.result == 'success'` so the seed still
    # proceeds when `reset` is skipped (inputs.reset === false), but is
    # correctly blocked when `reset` actually fails.
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (needs.reset.result == 'success' || needs.reset.result == 'skipped')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build shared-types
        run: npx turbo build --filter=@teranga/shared-types
      - name: Run full seed
        env:
          SEED_TARGET: staging
          FIREBASE_PROJECT_ID: ${{ needs.setup.outputs.project_id }}
          # After a reset, the idempotency guard sees an empty database and
          # proceeds with the bulk seed. When the operator unchecked the
          # reset input, we still want the full seed to run (the point of
          # this manual workflow is refreshing fixtures), so force it.
          SEED_FORCE: 'true'
        run: npx tsx scripts/seed-emulators.ts
      - name: Upsert QA fixture users (PR #59 role coverage)
        env:
          SEED_TARGET: staging
          FIREBASE_PROJECT_ID: ${{ needs.setup.outputs.project_id }}
        run: npx tsx scripts/seed-qa-fixtures.ts
