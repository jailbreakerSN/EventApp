name: Deploy to Staging

# Deploys on every push to `develop`. Safety comes from branch protection:
# `develop` requires the CI workflow's ci-gate check to pass before any PR
# can merge. This means everything that lands on `develop` has already
# passed CI, so deploying on push is safe.
#
# History: previously gated on `workflow_run` from the CI workflow, which
# is the "correct" GitHub pattern but has a footgun — `workflow_run`
# triggers only fire for workflows that exist on the **default branch**.
# With `main` as the default and this workflow living only on `develop`,
# `workflow_run` never fired on merges to `develop`. That silently broke
# all deploys (see the Firestore-index regression after PR #11). Switching
# back to `push` makes the behaviour explicit and reliable.
on:
  push:
    branches: [develop]
  # Allow manually re-deploying a specific commit (e.g., after fixing a
  # transient GCP issue) without forcing an empty commit.
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  # Must match ci.yml — apps/functions engines.node = 22; keeping CI and
  # deploy aligned avoids drift warnings.
  NODE_VERSION: "22"
  # The commit being deployed. With `push`/`workflow_dispatch` triggers,
  # github.sha points at the right commit directly — no workflow_run
  # indirection needed.
  DEPLOY_SHA: ${{ github.sha }}
  # Retry transient npm fetch failures (ECONNRESET on GHA runners is common).
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "10000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"

# ═══════════════════════════════════════════════════════════════════════════════
# Only 4 GitHub secrets required:
#   GCP_SA_KEY      — Firebase Admin SDK JSON key (derives everything else)
#   RESEND_API_KEY  — Resend email service API key. Consumed TWICE:
#                       - API (Cloud Run) reads it as a plain env var.
#                       - Functions (Cloud Functions v2) read it via
#                         Secret Manager. The "Provision Functions
#                         secrets" step below uploads the value into
#                         the RESEND_API_KEY Secret Manager entry on
#                         every deploy so rotation = update the GH secret.
#   QR_SECRET       — HMAC-SHA256 key for QR badge signing (API only)
#   WEBHOOK_SECRET  — Webhook signature verification key (API only)
#
# Secret Manager entries provisioned by the deploy (no GH secret needed):
#   RESEND_WEBHOOK_SECRET — Svix signing secret for the resendWebhook
#                           function. Seeded with the sentinel
#                           "pending-bootstrap"; the real value is
#                           written by invoking `bootstrapResendInfra`
#                           once after the first successful deploy.
#
# Optional variables (non-secret, set via `gh variable set`):
#   API_URL_STAGING — Cloud Run URL (auto-detected if service exists)
# ═══════════════════════════════════════════════════════════════════════════════

jobs:
  # ─── Derive all config from GCP_SA_KEY ────────────────────────────────────
  setup:
    name: Discover Firebase & GCP config
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      project_id: ${{ steps.discover.outputs.project_id }}
      project_number: ${{ steps.discover.outputs.project_number }}
      firebase_api_key: ${{ steps.discover.outputs.firebase_api_key }}
      firebase_auth_domain: ${{ steps.discover.outputs.firebase_auth_domain }}
      firebase_storage_bucket: ${{ steps.discover.outputs.firebase_storage_bucket }}
      firebase_messaging_sender_id: ${{ steps.discover.outputs.firebase_messaging_sender_id }}
      firebase_app_id: ${{ steps.discover.outputs.firebase_app_id }}
      firebase_measurement_id: ${{ steps.discover.outputs.firebase_measurement_id }}
      api_url: ${{ steps.discover.outputs.api_url }}
      backoffice_url: ${{ steps.discover.outputs.backoffice_url }}
      participant_url: ${{ steps.discover.outputs.participant_url }}
      cors_origins: ${{ steps.discover.outputs.cors_origins }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs
        run: |
          set -euo pipefail
          # Idempotent: only enables APIs that aren't already enabled.
          # Requires 'Service Usage Admin' role on the service account.
          gcloud services enable \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            cloudfunctions.googleapis.com \
            cloudbilling.googleapis.com \
            artifactregistry.googleapis.com \
            containerregistry.googleapis.com \
            firebase.googleapis.com \
            firebasehosting.googleapis.com \
            firebaseextensions.googleapis.com \
            firebaserules.googleapis.com \
            firestore.googleapis.com \
            firebasestorage.googleapis.com \
            iamcredentials.googleapis.com \
            cloudscheduler.googleapis.com \
            eventarc.googleapis.com \
            pubsub.googleapis.com \
            secretmanager.googleapis.com \
            --quiet

      - name: Grant IAM roles to GCP service agents (for Firebase Functions)
        run: |
          set -euo pipefail
          # Firebase Functions deploy requires specific IAM bindings on
          # GCP-managed service agents. These are idempotent.
          # Requires 'Project IAM Admin' role on the deploy service account.

          PROJECT_ID=$(echo "$SA_KEY" | jq -r '.project_id')
          PROJECT_NUMBER=$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')

          PUBSUB_SA="service-${PROJECT_NUMBER}@gcp-sa-pubsub.iam.gserviceaccount.com"
          EVENTARC_SA="service-${PROJECT_NUMBER}@gcp-sa-eventarc.iam.gserviceaccount.com"
          COMPUTE_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          # Trigger service identity creation (no-op if exists)
          gcloud beta services identity create --service=pubsub.googleapis.com --project="$PROJECT_ID" || true
          gcloud beta services identity create --service=eventarc.googleapis.com --project="$PROJECT_ID" || true

          for binding in \
            "serviceAccount:${PUBSUB_SA}|roles/iam.serviceAccountTokenCreator" \
            "serviceAccount:${EVENTARC_SA}|roles/eventarc.serviceAgent" \
            "serviceAccount:${COMPUTE_SA}|roles/run.invoker" \
            "serviceAccount:${COMPUTE_SA}|roles/eventarc.eventReceiver" \
            "serviceAccount:${COMPUTE_SA}|roles/datastore.user" \
            "serviceAccount:${COMPUTE_SA}|roles/storage.objectAdmin" \
            "serviceAccount:${COMPUTE_SA}|roles/firebasecloudmessaging.admin"; do
            member="${binding%|*}"
            role="${binding#*|}"
            gcloud projects add-iam-policy-binding "$PROJECT_ID" \
              --member="$member" --role="$role" \
              --condition=None --quiet >/dev/null || \
              echo "::warning::Failed to bind $role to $member (may already exist or SA lacks Project IAM Admin)"
          done

          # Grant the Cloud Run runtime SA Token Creator on ITSELF so the
          # Firebase Admin SDK can call `iamcredentials.signBlob` when no
          # private key is present in the image (Workload Identity path —
          # the default on Cloud Run). Two runtime paths require it:
          #   (a) `getSignedUrl()` on storage — badge PDF downloads 500
          #       with "Permission 'iam.serviceAccounts.signBlob' denied"
          #       without it.
          #   (b) `auth.createCustomToken()` on Firebase Auth — admin
          #       impersonation (`/v1/admin/users/:uid/impersonate`) 500s
          #       on the same IAM denial. See fix(admin): wrap
          #       createCustomToken failures (`IMPERSONATION_SIGNING_UNAVAILABLE`).
          #
          # Strategy: check-first → apply → verify → fail-hard with a
          # deterministic, ops-actionable message if the deploy SA lacks
          # the meta-permission to write the binding.
          TC_ROLE="roles/iam.serviceAccountTokenCreator"
          TC_MEMBER="serviceAccount:${COMPUTE_SA}"

          # Fast-path: if the binding already exists, skip the write.
          # `--flatten` emits one row per (member, role) pair so the grep
          # is unambiguous — no risk of matching a partial role name.
          if gcloud iam service-accounts get-iam-policy "$COMPUTE_SA" \
                --project="$PROJECT_ID" --format="value(bindings.role,bindings.members)" \
                --flatten="bindings[].members" 2>/dev/null \
                | grep -qE "^${TC_ROLE}\s+${TC_MEMBER}$"; then
            echo "::notice::${TC_ROLE} already bound on ${COMPUTE_SA} (self). Skipping."
          else
            # Apply with bounded retry — IAM propagation on fresh projects
            # can take a few seconds. Three attempts, 2s / 4s / 8s backoff.
            TC_APPLIED=0
            for attempt in 1 2 3; do
              if gcloud iam service-accounts add-iam-policy-binding "$COMPUTE_SA" \
                    --member="$TC_MEMBER" \
                    --role="$TC_ROLE" \
                    --project="$PROJECT_ID" \
                    --condition=None --quiet >/dev/null 2>&1; then
                TC_APPLIED=1
                echo "::notice::${TC_ROLE} bound on ${COMPUTE_SA} (self) — attempt $attempt."
                break
              fi
              sleep $((2 ** attempt))
            done

            if [ "$TC_APPLIED" -eq 0 ]; then
              echo "::error::Failed to grant ${TC_ROLE} on ${COMPUTE_SA} (self) after 3 attempts."
              echo "::error::Without this binding, Firebase Admin SDK signBlob calls will 500 at runtime:"
              echo "::error::  - badge PDF downloads (storage.getSignedUrl)"
              echo "::error::  - admin impersonation (auth.createCustomToken)"
              echo "::error::The deploy service account needs 'roles/iam.serviceAccountAdmin' on"
              echo "::error::${COMPUTE_SA} to apply this binding. Grant once (manually in the GCP"
              echo "::error::console or via gcloud) and the next deploy will self-heal."
              exit 1
            fi

            # Verify the write actually landed (belt-and-braces — some IAM
            # propagation oddities on fresh projects let the add command
            # succeed without the binding showing up immediately).
            VERIFY_ATTEMPTS=5
            for attempt in $(seq 1 "$VERIFY_ATTEMPTS"); do
              if gcloud iam service-accounts get-iam-policy "$COMPUTE_SA" \
                    --project="$PROJECT_ID" --format="value(bindings.role,bindings.members)" \
                    --flatten="bindings[].members" 2>/dev/null \
                    | grep -qE "^${TC_ROLE}\s+${TC_MEMBER}$"; then
                echo "::notice::Verified ${TC_ROLE} on ${COMPUTE_SA} (self) — attempt $attempt."
                break
              fi
              if [ "$attempt" -eq "$VERIFY_ATTEMPTS" ]; then
                echo "::error::IAM binding applied but not visible after $VERIFY_ATTEMPTS read attempts."
                echo "::error::This usually clears within a few minutes. Re-run the workflow if the next deploy still 500s on signBlob."
                exit 1
              fi
              sleep 3
            done
          fi
        env:
          SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Discover config from SA key and Firebase API
        id: discover
        env:
          SA_KEY: ${{ secrets.GCP_SA_KEY }}
          # Optional custom-domain overrides (empty string if the var is
          # unset → falls back to the computed *.run.app URL).
          API_PUBLIC_URL_OVERRIDE: ${{ vars.API_PUBLIC_URL }}
          PARTICIPANT_PUBLIC_URL_OVERRIDE: ${{ vars.PARTICIPANT_PUBLIC_URL }}
          BACKOFFICE_PUBLIC_URL_OVERRIDE: ${{ vars.BACKOFFICE_PUBLIC_URL }}
        run: |
          set -euo pipefail

          # ── 1. Extract project_id from the SA key JSON ──
          PROJECT_ID=$(echo "$SA_KEY" | jq -r '.project_id')
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "::notice::Project ID: $PROJECT_ID"

          # ── 2. Get access token for Firebase Management API ──
          ACCESS_TOKEN=$(gcloud auth print-access-token)

          # ── 3. Discover Firebase web app SDK config ──
          echo "Fetching Firebase web apps..."
          WEB_APPS=$(curl -sf -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://firebase.googleapis.com/v1beta1/projects/$PROJECT_ID/webApps")

          APP_ID=$(echo "$WEB_APPS" | jq -r '.apps[0].appId // empty')

          if [ -z "$APP_ID" ]; then
            echo "::warning::No Firebase web app found. Using convention-based defaults."
            echo "firebase_api_key=" >> $GITHUB_OUTPUT
            echo "firebase_auth_domain=$PROJECT_ID.firebaseapp.com" >> $GITHUB_OUTPUT
            echo "firebase_storage_bucket=$PROJECT_ID.firebasestorage.app" >> $GITHUB_OUTPUT
            echo "firebase_messaging_sender_id=" >> $GITHUB_OUTPUT
            echo "firebase_app_id=" >> $GITHUB_OUTPUT
            echo "firebase_measurement_id=" >> $GITHUB_OUTPUT
          else
            echo "Fetching SDK config for app: $APP_ID"
            CONFIG=$(curl -sf -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://firebase.googleapis.com/v1beta1/projects/$PROJECT_ID/webApps/$APP_ID/config")

            echo "firebase_api_key=$(echo "$CONFIG" | jq -r '.apiKey // empty')" >> $GITHUB_OUTPUT
            echo "firebase_auth_domain=$(echo "$CONFIG" | jq -r '.authDomain // empty')" >> $GITHUB_OUTPUT
            echo "firebase_storage_bucket=$(echo "$CONFIG" | jq -r '.storageBucket // empty')" >> $GITHUB_OUTPUT
            echo "firebase_messaging_sender_id=$(echo "$CONFIG" | jq -r '.messagingSenderId // empty')" >> $GITHUB_OUTPUT
            echo "firebase_app_id=$(echo "$CONFIG" | jq -r '.appId // empty')" >> $GITHUB_OUTPUT
            echo "firebase_measurement_id=$(echo "$CONFIG" | jq -r '.measurementId // empty')" >> $GITHUB_OUTPUT
          fi

          # ── 4. Compute deterministic Cloud Run URLs ──
          # All Cloud Run services in a given region follow the URL pattern:
          #   https://{SERVICE_NAME}-{PROJECT_NUMBER}.{REGION}.run.app
          # This lets us know URLs BEFORE services are deployed, enabling correct
          # CORS config on first deploy without a chicken-and-egg problem.
          PROJECT_NUMBER=$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')
          REGION=europe-west1

          # Custom-domain overrides — when operators map api.terangaevent.com
          # → the API Cloud Run service (and friends), they set these as
          # GitHub **Variables** (not Secrets — they're public URLs).
          # Overrides kick the app up to the sender-domain-matching state
          # Resend's deliverability analyzer asks for (link URLs on the
          # same apex as the From header). Fallback is always the
          # predictable run.app URL, so a fresh project still deploys
          # without any GitHub Variable configuration.
          #
          # Set one per environment via:
          #   gh variable set API_PUBLIC_URL --body https://api.terangaevent.com --env staging
          #   gh variable set PARTICIPANT_PUBLIC_URL --body https://app.terangaevent.com --env staging
          #   gh variable set BACKOFFICE_PUBLIC_URL --body https://admin.terangaevent.com --env staging
          # See docs/email-deliverability.md for the Cloud Run domain
          # mapping + DNS steps that must happen first.
          API_URL="${API_PUBLIC_URL_OVERRIDE:-https://teranga-api-staging-${PROJECT_NUMBER}.${REGION}.run.app}"
          BACKOFFICE_URL="${BACKOFFICE_PUBLIC_URL_OVERRIDE:-https://teranga-backoffice-staging-${PROJECT_NUMBER}.${REGION}.run.app}"
          PARTICIPANT_URL="${PARTICIPANT_PUBLIC_URL_OVERRIDE:-https://teranga-participant-staging-${PROJECT_NUMBER}.${REGION}.run.app}"
          # CORS origins are the browser-facing apps only. The API does not
          # call itself from a browser context, so its own URL must never be
          # an allowed origin — including it would let the API accept cross-
          # origin requests from any page that can spoof that Origin header.
          CORS_ORIGINS="${BACKOFFICE_URL},${PARTICIPANT_URL}"

          echo "project_number=$PROJECT_NUMBER" >> $GITHUB_OUTPUT
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "backoffice_url=$BACKOFFICE_URL" >> $GITHUB_OUTPUT
          echo "participant_url=$PARTICIPANT_URL" >> $GITHUB_OUTPUT
          echo "cors_origins=$CORS_ORIGINS" >> $GITHUB_OUTPUT

          echo "::notice::Project Number: $PROJECT_NUMBER"
          echo "::notice::API URL:         $API_URL"
          echo "::notice::Backoffice URL:  $BACKOFFICE_URL"
          echo "::notice::Participant URL: $PARTICIPANT_URL"

  # ─── Deploy API to Cloud Run ──────────────────────────────────────────────
  deploy-api:
    name: Deploy API to Cloud Run (staging)
    runs-on: ubuntu-latest
    needs: setup
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Ensure Artifact Registry repo exists
        run: |
          set -euo pipefail
          # Idempotent: creates 'teranga' Docker repo in europe-west1 if missing.
          gcloud artifacts repositories describe teranga \
            --location=europe-west1 >/dev/null 2>&1 || \
          gcloud artifacts repositories create teranga \
            --repository-format=docker \
            --location=europe-west1 \
            --description="Teranga Events container images" \
            --quiet
      - name: Apply Artifact Registry cleanup policy
        # Cost control: every deploy pushes 3 new images tagged with the commit
        # SHA, and nothing ever deletes them. Storage grows forever at
        # ~€0.10/GB·month. The policy (infrastructure/artifact-registry/
        # cleanup-policy.json) keeps the 3 most recent versions of each
        # package and deletes the rest — server-side, runs every ~24h.
        # Idempotent: re-applying the same policy is a no-op.
        run: |
          set -euo pipefail
          gcloud artifacts repositories set-cleanup-policies teranga \
            --location=europe-west1 \
            --policy=infrastructure/artifact-registry/cleanup-policy.json \
            --no-dry-run \
            --quiet
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        # Required for docker/build-push-action with GHA cache backend.
        uses: docker/setup-buildx-action@v3
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-api:${{ env.DEPLOY_SHA }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ env.DEPLOY_SHA }}
          # GitHub Actions cache backend. `scope=api` keeps per-service caches
          # isolated so a backoffice build doesn't evict API layers.
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Scan API image for HIGH vulnerabilities (warn-only)
        # Visibility-only. Does not fail the build; listed so HIGH findings
        # are surfaced in the run log and can be triaged asynchronously.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-api:${{ env.DEPLOY_SHA }}
          severity: HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: table
      - name: Scan API image for CRITICAL vulnerabilities (blocking)
        # Mirrors the npm audit policy already in CI: CRITICAL blocks, HIGH warns.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-api:${{ env.DEPLOY_SHA }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Deploy to Cloud Run
        # Staging cost controls:
        #   --cpu 1 --memory 512Mi  : smallest sensible profile for
        #     Fastify + firebase-admin (256Mi risks OOM on first warm-up).
        #   --min-instances 0       : no always-on billing when idle.
        #   --max-instances 2       : cap runaway scale in dev.
        #   --concurrency 80        : default, 80 requests per instance.
        #   --no-cpu-boost          : skip the 2x CPU startup boost. Longer
        #                             cold starts, but we don't care here.
        # The '^@^' prefix tells gcloud to use '@' as the delimiter between
        # env var entries instead of the default ','. This is required because
        # CORS_ORIGINS contains commas.
        run: |
          gcloud run deploy teranga-api-staging \
            --image europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-api:${{ env.DEPLOY_SHA }} \
            --region europe-west1 \
            --allow-unauthenticated \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2 \
            --concurrency 80 \
            --no-cpu-boost \
            --timeout 360 \
            --set-env-vars "^@^NODE_ENV=staging@FIREBASE_PROJECT_ID=${{ needs.setup.outputs.project_id }}@FIREBASE_STORAGE_BUCKET=${{ needs.setup.outputs.firebase_storage_bucket }}@QR_SECRET=${{ secrets.QR_SECRET }}@WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}@RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}@SENTRY_DSN=${{ secrets.SENTRY_DSN }}@CORS_ORIGINS=${{ needs.setup.outputs.cors_origins }}@API_BASE_URL=${{ needs.setup.outputs.api_url }}@PARTICIPANT_WEB_URL=${{ needs.setup.outputs.participant_url }}@WEB_BACKOFFICE_URL=${{ needs.setup.outputs.backoffice_url }}@RATE_LIMIT_MAX=100@RATE_LIMIT_WINDOW_MS=60000@LOG_LEVEL=info"
          # --timeout 360 covers the admin-jobs runner's 5-minute
          # MAX_RUN_MS + ~1 min of headroom. Without this, a long
          # handler would land as a client-side 504 while Cloud Run
          # kept the instance running past our service-level
          # timeout, leaving the run row stranded in `running`
          # status. Bumping Cloud Run's timeout to 6 min lets the
          # service's own AbortSignal fire first and the `finally`
          # block release the lock + write the terminal row.

  # ─── Deploy Web Backoffice to Cloud Run ───────────────────────────────────
  deploy-web-backoffice:
    name: Deploy Web Backoffice to Cloud Run (staging)
    runs-on: ubuntu-latest
    needs: setup
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Backoffice image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web-backoffice/Dockerfile
          push: true
          tags: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-backoffice:${{ env.DEPLOY_SHA }}
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ needs.setup.outputs.firebase_api_key }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ needs.setup.outputs.firebase_auth_domain }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ needs.setup.outputs.project_id }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ needs.setup.outputs.firebase_storage_bucket }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ needs.setup.outputs.firebase_messaging_sender_id }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ needs.setup.outputs.firebase_app_id }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ needs.setup.outputs.firebase_measurement_id }}
            NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.FIREBASE_VAPID_KEY }}
            NEXT_PUBLIC_API_URL=${{ needs.setup.outputs.api_url }}
            NEXT_PUBLIC_PARTICIPANT_URL=${{ needs.setup.outputs.participant_url }}
          cache-from: type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=backoffice
      - name: Scan Backoffice image for HIGH vulnerabilities (warn-only)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-backoffice:${{ env.DEPLOY_SHA }}
          severity: HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: table
      - name: Scan Backoffice image for CRITICAL vulnerabilities (blocking)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-backoffice:${{ env.DEPLOY_SHA }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Deploy to Cloud Run
        # Staging cost controls: cap max-instances at 2 and disable cpu-boost.
        # Bump these when promoting to production.
        run: |
          gcloud run deploy teranga-backoffice-staging \
            --image europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-backoffice:${{ env.DEPLOY_SHA }} \
            --region europe-west1 \
            --allow-unauthenticated \
            --port 3000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2 \
            --concurrency 80 \
            --no-cpu-boost \
            --set-env-vars "NODE_ENV=production"

  # ─── Deploy Web Participant to Cloud Run ──────────────────────────────────
  deploy-web-participant:
    name: Deploy Web Participant to Cloud Run (staging)
    runs-on: ubuntu-latest
    needs: setup
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Participant image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web-participant/Dockerfile
          push: true
          tags: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-participant:${{ env.DEPLOY_SHA }}
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ needs.setup.outputs.firebase_api_key }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ needs.setup.outputs.firebase_auth_domain }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ needs.setup.outputs.project_id }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ needs.setup.outputs.firebase_storage_bucket }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ needs.setup.outputs.firebase_messaging_sender_id }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ needs.setup.outputs.firebase_app_id }}
            NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.FIREBASE_VAPID_KEY }}
            NEXT_PUBLIC_API_URL=${{ needs.setup.outputs.api_url }}
            NEXT_PUBLIC_APP_URL=${{ needs.setup.outputs.participant_url }}
            NEXT_PUBLIC_BACKOFFICE_URL=${{ needs.setup.outputs.backoffice_url }}
          cache-from: type=gha,scope=participant
          cache-to: type=gha,mode=max,scope=participant
      - name: Scan Participant image for HIGH vulnerabilities (warn-only)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-participant:${{ env.DEPLOY_SHA }}
          severity: HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: table
      - name: Scan Participant image for CRITICAL vulnerabilities (blocking)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-participant:${{ env.DEPLOY_SHA }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table
      - name: Deploy to Cloud Run
        # Staging cost controls: cap max-instances at 2 and disable cpu-boost.
        # Bump these when promoting to production.
        run: |
          gcloud run deploy teranga-participant-staging \
            --image europe-west1-docker.pkg.dev/${{ needs.setup.outputs.project_id }}/teranga/teranga-participant:${{ env.DEPLOY_SHA }} \
            --region europe-west1 \
            --allow-unauthenticated \
            --port 3000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2 \
            --concurrency 80 \
            --no-cpu-boost \
            --set-env-vars "NODE_ENV=production"

  # ─── Deploy Firebase (rules, indexes, storage, functions) ────────────────
  deploy-firebase:
    name: Deploy Firebase rules/indexes/storage/functions (staging)
    runs-on: ubuntu-latest
    needs: setup
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build shared types
        run: npx turbo build --filter=@teranga/shared-types
      - name: Build functions
        run: npm run build --workspace=apps/functions

      - name: Vendor shared-types into functions directory
        # Firebase Functions uploads only the apps/functions/ folder. The
        # workspace dep '@teranga/shared-types' won't resolve in Cloud Build
        # because it's not on npm. Copy the built package into
        # apps/functions/vendor/ and rewrite the dependency to a local
        # file path.
        run: |
          set -euo pipefail
          VENDOR=apps/functions/vendor/shared-types
          mkdir -p "$VENDOR"
          cp packages/shared-types/package.json "$VENDOR/"
          cp -r packages/shared-types/dist "$VENDOR/dist"
          # Rewrite the dependency to point at the vendored copy
          (cd apps/functions && npm pkg set dependencies.@teranga/shared-types=file:./vendor/shared-types)

      # Note: A previous revision of this workflow force-deleted all Cloud
      # Functions before each deploy to recover from a one-off trigger-type
      # migration (HTTPS → Firestore). That migration is done, and deleting
      # functions on every deploy caused unnecessary cold starts and brief
      # downtime. If a trigger type changes again, handle it manually with a
      # one-shot `gcloud functions delete` rather than on every deploy.

      # Split into per-resource deploys so a failure on one doesn't mask or
      # block the others. Previously these were a single combined command:
      #   firebase-tools deploy --only firestore:rules,firestore:indexes,storage,functions
      # which could mask a silent failure on one resource (e.g., the SA
      # missing the datastore.indexAdmin role would skip indexes while
      # reporting overall success). Separate steps make failures loud.
      - name: Deploy Firestore rules
        run: |
          npx firebase-tools deploy \
            --only firestore:rules \
            --project ${{ needs.setup.outputs.project_id }} \
            --force --non-interactive

      # Strict subset audit — the CI gate blocks on primary (maximal +
      # mandatory-only) shapes; here we run the full power-set check
      # (AUDIT_SUBSETS=1) as a *warning-only* step. Subset gaps only
      # surface at runtime on the specific filter combination a user
      # happens to submit (previous staging incident was category +
      # location.city + status, 2026-04-19). Logs are attached to the
      # deploy run so an operator can spot new gaps, but we don't block
      # the deploy because the primary-only set is the authoritative CI
      # gate. Flip `continue-on-error` to false once every reachable
      # subset has a declared index.
      - name: Audit Firestore index coverage (strict, all subsets — warning-only)
        continue-on-error: true
        run: npm run audit:firestore-indexes:strict

      - name: Deploy Firestore indexes
        # Requires the deploy SA to have `roles/datastore.indexAdmin` (or
        # broader Firebase admin). If this step fails with PERMISSION_DENIED,
        # grant that role to the deploy SA in GCP IAM.
        run: |
          npx firebase-tools deploy \
            --only firestore:indexes \
            --project ${{ needs.setup.outputs.project_id }} \
            --force --non-interactive

      - name: Provision Firestore TTL policies
        # Every deploy re-asserts TTL on the collections listed below.
        # Idempotent: already-ACTIVE policies are a no-op; already-CREATING
        # policies are skipped (next deploy picks them up once transitioned).
        # Adding a new TTL-backed collection = add to the list in ONE place.
        #
        # Same list as `notification-ops-prereqs.yml → TTL_COLLECTION_GROUPS`
        # — that workflow remains the break-glass tool for provisioning
        # production outside a deploy, this step covers routine staging pushes.
        #
        # Requires the deploy SA to have `roles/datastore.owner` OR
        # `roles/firestore.fieldsAdmin`. If this fails with PERMISSION_DENIED,
        # grant that role once via GCP IAM and re-run the workflow.
        #
        # Async activation is intentional — TTL takes 2-5 min to land
        # ACTIVE and we don't want to block every deploy on that. Until the
        # policy activates, rows accumulate but nothing breaks.
        env:
          PROJECT_ID: ${{ needs.setup.outputs.project_id }}
          # MUST stay in sync with .github/workflows/notification-ops-prereqs.yml
          # → env.TTL_COLLECTION_GROUPS. Both reference the same canonical set.
          TTL_COLLECTION_GROUPS: "notificationDispatchLog rateLimitBuckets impersonationCodes webhookEvents"
          TTL_FIELD: expiresAt
        run: |
          set -euo pipefail
          FAILED=()
          for CG in $TTL_COLLECTION_GROUPS; do
            STATE=$(gcloud firestore fields describe "$TTL_FIELD" \
              --collection-group="$CG" \
              --project="$PROJECT_ID" \
              --database="(default)" \
              --format='value(ttlConfig.state)' 2>/dev/null || echo "NOT_CONFIGURED")
            echo "[$CG.$TTL_FIELD] current TTL state: $STATE"

            if [ "$STATE" = "ACTIVE" ] || [ "$STATE" = "CREATING" ]; then
              echo "[$CG.$TTL_FIELD] already $STATE — no action taken."
              continue
            fi

            if gcloud firestore fields ttls update "$TTL_FIELD" \
                --collection-group="$CG" \
                --project="$PROJECT_ID" \
                --database="(default)" \
                --enable-ttl \
                --async \
                --quiet; then
              echo "::notice::[$CG.$TTL_FIELD] activation requested."
            else
              echo "::warning::[$CG.$TTL_FIELD] activation FAILED."
              FAILED+=("$CG.$TTL_FIELD")
            fi
          done

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::Some TTL activations failed: ${FAILED[*]}"
            exit 1
          fi

      - name: Deploy Storage rules
        run: |
          npx firebase-tools deploy \
            --only storage \
            --project ${{ needs.setup.outputs.project_id }} \
            --force --non-interactive

      - name: Provision Functions secrets in Secret Manager
        # Cloud Functions v2 `defineSecret(...)` bindings fail the deploy if
        # the referenced secret doesn't exist in Secret Manager. Create the
        # two secrets the resend triggers declare, populate them, and grant
        # the Cloud Functions runtime SA read access. All steps are
        # idempotent — re-running is a no-op when the desired state already
        # matches.
        #
        #   RESEND_API_KEY          — real key from the GitHub Actions
        #                             secret of the same name. Re-seeded
        #                             on every deploy so rotation just
        #                             means updating the GitHub secret.
        #                             We only add a new Secret Manager
        #                             version when the payload differs,
        #                             to avoid version churn.
        #   RESEND_WEBHOOK_SECRET   — seeded with the sentinel value
        #                             "pending-bootstrap" if no version
        #                             exists. The real signing secret is
        #                             written by the bootstrapResendInfra
        #                             callable once Resend returns it
        #                             (requires secretVersionAdder below).
        #                             We never overwrite an existing real
        #                             value — only add the placeholder
        #                             when the secret is fresh.
        env:
          PROJECT_ID: ${{ needs.setup.outputs.project_id }}
          PROJECT_NUMBER: ${{ needs.setup.outputs.project_number }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${RESEND_API_KEY:-}" ]; then
            echo "::error::RESEND_API_KEY GitHub secret is empty — add it under Settings → Secrets → Actions"
            exit 1
          fi

          # Cloud Functions v2 runs as the default Compute Engine SA unless
          # overridden. That's the SA we must grant read access to.
          RUNTIME_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"

          ensure_secret() {
            local name="$1"
            if ! gcloud secrets describe "$name" --project="$PROJECT_ID" >/dev/null 2>&1; then
              echo "::notice::Creating secret $name"
              gcloud secrets create "$name" \
                --project="$PROJECT_ID" \
                --replication-policy=automatic \
                --quiet
            else
              echo "::notice::Secret $name already exists"
            fi
          }

          # Add a new version only when the latest stored value differs from
          # the desired payload. gcloud exits 1 on access() when the secret
          # has no versions yet — treat that as "needs a version".
          add_version_if_changed() {
            local name="$1" desired="$2"
            local current
            if current=$(gcloud secrets versions access latest \
                --secret="$name" --project="$PROJECT_ID" 2>/dev/null); then
              if [ "$current" = "$desired" ]; then
                echo "::notice::Secret $name latest version matches GitHub value — skipping"
                return 0
              fi
              echo "::notice::Secret $name latest version differs — adding new version"
            else
              echo "::notice::Secret $name has no accessible version yet — seeding first one"
            fi
            printf '%s' "$desired" | gcloud secrets versions add "$name" \
              --project="$PROJECT_ID" \
              --data-file=- \
              --quiet >/dev/null
          }

          # Add the placeholder only when no version exists, so the real
          # signing secret written by bootstrapResendInfra isn't clobbered.
          seed_placeholder_if_empty() {
            local name="$1" placeholder="$2"
            if gcloud secrets versions access latest \
                --secret="$name" --project="$PROJECT_ID" >/dev/null 2>&1; then
              echo "::notice::Secret $name already has a version — leaving real value intact"
              return 0
            fi
            echo "::notice::Secret $name has no versions — seeding with placeholder"
            printf '%s' "$placeholder" | gcloud secrets versions add "$name" \
              --project="$PROJECT_ID" \
              --data-file=- \
              --quiet >/dev/null
          }

          grant_accessor() {
            local name="$1"
            gcloud secrets add-iam-policy-binding "$name" \
              --project="$PROJECT_ID" \
              --member="serviceAccount:${RUNTIME_SA}" \
              --role="roles/secretmanager.secretAccessor" \
              --condition=None \
              --quiet >/dev/null || \
              echo "::warning::Failed to grant secretAccessor on $name to $RUNTIME_SA"
          }

          grant_version_adder() {
            local name="$1"
            gcloud secrets add-iam-policy-binding "$name" \
              --project="$PROJECT_ID" \
              --member="serviceAccount:${RUNTIME_SA}" \
              --role="roles/secretmanager.secretVersionAdder" \
              --condition=None \
              --quiet >/dev/null || \
              echo "::warning::Failed to grant secretVersionAdder on $name to $RUNTIME_SA"
          }

          # RESEND_API_KEY — real key, read by every trigger that calls Resend.
          ensure_secret RESEND_API_KEY
          add_version_if_changed RESEND_API_KEY "$RESEND_API_KEY"
          grant_accessor RESEND_API_KEY

          # RESEND_WEBHOOK_SECRET — starts as a sentinel; the bootstrap
          # callable writes the real Svix signing secret later, which is
          # why the runtime SA also needs secretVersionAdder here.
          ensure_secret RESEND_WEBHOOK_SECRET
          seed_placeholder_if_empty RESEND_WEBHOOK_SECRET pending-bootstrap
          grant_accessor RESEND_WEBHOOK_SECRET
          grant_version_adder RESEND_WEBHOOK_SECRET

      - name: Heal Resend functions stuck from prior failed deploy
        # One-shot migration. The 2026-04-21 staging deploy failed half-
        # way because `minimalOptions` was 128MiB — the healthcheck timed
        # out and Firebase registered `onNewsletterSubscriberUpdated` with
        # a partial / HTTPS-typed config. Subsequent deploys (even after
        # fixing the memory floor in #138) then refuse to redeploy it:
        #
        #   Error: [teranga-functions:onNewsletterSubscriberUpdated(
        #   europe-west1)] Changing from an HTTPS function to a background
        #   triggered function is not allowed. Please delete your function
        #   and create a new one instead.
        #
        # The deploy-staging.yml header already calls out this exact class
        # of problem ("If a trigger type changes again, handle it
        # manually with a one-shot `gcloud functions delete`"). We do it
        # here as a *scoped, time-bounded* step instead of the
        # file-wide force-delete the workflow previously used (which was
        # removed because it churned cold starts on every deploy).
        #
        # Scope: only the Resend sync-layer functions introduced in #136
        # (the ones `minimalOptions` actually touches). `gcloud functions
        # delete` exits 0 when the function doesn't exist with
        # --quiet + || true, so this step is idempotent — after the next
        # successful deploy, every call becomes a no-op.
        #
        # TODO(DEVOPS): Remove this step once staging AND prod have
        # shipped a clean deploy of all four functions. File a follow-up
        # ticket when deleting. Keep the comment + runbook note in
        # deploy-staging.yml's header so the next incident can copy the
        # pattern rather than rediscover it.
        run: |
          set -euo pipefail
          PROJECT_ID="${{ needs.setup.outputs.project_id }}"
          REGION=europe-west1

          for fn in \
            onNewsletterSubscriberCreated \
            onNewsletterSubscriberUpdated \
            resendWebhook \
            reconcileResendSegment; do
            echo "::notice::Checking for stuck deploy of $fn"
            gcloud functions delete "$fn" \
              --region="$REGION" \
              --project="$PROJECT_ID" \
              --gen2 \
              --quiet 2>&1 | sed 's/^/  /' || \
              echo "  (no existing function to delete — continuing)"
          done

      - name: Deploy Cloud Functions
        run: |
          npx firebase-tools deploy \
            --only functions \
            --project ${{ needs.setup.outputs.project_id }} \
            --force --non-interactive

  # ─── Seed staging database (one-time, idempotent) ────────────────────────
  # Runs the seed script against the real Firestore. The script checks for
  # existing data and skips the bulk seed if the database already has
  # organizations — but the plan catalog + effective-limits backfill run
  # unconditionally on every deploy (they're pure upserts / denormalization
  # refreshes, safe to re-run). Depends on deploy-firebase so rules +
  # indexes are in place first.
  seed-staging:
    name: Seed staging database (idempotent)
    runs-on: ubuntu-latest
    needs: [setup, deploy-firebase]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build shared-types
        # Required because seed-plans.ts and backfill-effective-limits.ts
        # import from @teranga/shared-types (PLAN_LIMITS, PLAN_DISPLAY,
        # PLAN_LIMIT_UNLIMITED).
        run: npx turbo build --filter=@teranga/shared-types
      - name: Run seed script (upserts plan catalog + backfill; bulk seed skips if data exists)
        env:
          SEED_TARGET: staging
          FIREBASE_PROJECT_ID: ${{ needs.setup.outputs.project_id }}
        run: npx tsx scripts/seed-emulators.ts

  # ─── Seed QA fixture users (independent of the main seed guard) ──────────
  # PR #59 introduced three role-coverage fixtures (staff / multirole /
  # authonly) used to validate the admin users table after the
  # onUserCreated trigger fix. The main `seed-staging` step above skips
  # the user-creation block once any org exists in staging, so new
  # fixture users added AFTER the first deploy never land without an
  # explicit step. This job runs a dedicated idempotent script that
  # upserts ONLY those three users — safe to re-run on every deploy,
  # no impact on existing data.
  seed-qa-fixtures:
    name: Seed QA fixture users (PR #59)
    runs-on: ubuntu-latest
    needs: [setup, seed-staging]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Upsert QA fixture users (staff / multirole / authonly)
        env:
          SEED_TARGET: staging
          FIREBASE_PROJECT_ID: ${{ needs.setup.outputs.project_id }}
        run: npx tsx scripts/seed-qa-fixtures.ts

  # ─── Backfill balance-transactions ledger (PR #62) ───────────────────────
  # Replays every historical payment/payout into the balance_transactions
  # ledger so the /finance page balance endpoint (PR 2) returns the
  # correct lifetime totals on first load, instead of showing 0 until a
  # new payment webhook fires.
  #
  # Idempotent by design: each entry gets a deterministic doc id derived
  # from sha256(kind|sourceId), so concurrent or repeated runs converge
  # on the same docs rather than creating duplicates. The script uses an
  # `exists()` probe before every write, so subsequent deploys on an
  # already-backfilled database are effectively no-ops (~1 Firestore read
  # per payment and per payout, negligible at staging scale).
  #
  # Rationale for running on every deploy instead of once:
  #   - A forgotten one-off job is a one-off regression waiting to happen.
  #   - Idempotent script + cheap no-op means zero cost when there's
  #     nothing new to backfill.
  #   - If any live code path ever bypasses the ledger write (bug),
  #     the next deploy's backfill catches the gap automatically.
  backfill-ledger:
    name: Backfill balance ledger (PR #62)
    runs-on: ubuntu-latest
    needs: [setup, seed-staging]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build shared-types
        # Required because the backfill script imports BalanceTransaction
        # / Payment / Payout types from @teranga/shared-types.
        run: npx turbo build --filter=@teranga/shared-types
      - name: Replay payments + payouts into balance_transactions
        env:
          SEED_TARGET: staging
          FIREBASE_PROJECT_ID: ${{ needs.setup.outputs.project_id }}
        run: npx tsx scripts/backfill-balance-ledger.ts

  # ─── Post-deploy smoke test ──────────────────────────────────────────────
  # Replaces the former 10-minute uptime cron: we only probe once after the
  # CD pipeline completes, which is enough signal in dev/staging and avoids
  # the cost of 144 Cloud Run invocations per day from a 10-min cron hitting
  # /ready (which actually queries Firestore, so it's not free).
  smoke-test:
    name: Smoke test staging endpoints
    runs-on: ubuntu-latest
    needs:
      [
        setup,
        deploy-api,
        deploy-web-backoffice,
        deploy-web-participant,
        seed-staging,
        seed-qa-fixtures,
        backfill-ledger,
      ]
    environment: staging
    permissions:
      contents: read
      issues: write # Required to file a failure issue
    steps:
      # Every other job in this workflow checks out the repo; this job was
      # missing it because the original "Probe endpoints" step was inline
      # bash (no repo files). When the admin-probe step was added later
      # (node scripts/smoke-probe-admin.mjs) the checkout was never
      # back-filled, so the job failed with MODULE_NOT_FOUND on the
      # script path on every run. Fix: check out the repo + install Node
      # 20 at the top, exactly as the other deploy jobs do.
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Probe endpoints
        id: probe
        env:
          API_URL: ${{ needs.setup.outputs.api_url }}
          BACKOFFICE_URL: ${{ needs.setup.outputs.backoffice_url }}
          PARTICIPANT_URL: ${{ needs.setup.outputs.participant_url }}
        run: |
          set +e # Collect all results instead of stopping on first failure.
          FAIL=0
          REPORT=""

          check() {
            local name="$1" url="$2" expected_code="${3:-200}"
            # 5 attempts with backoff — first request after a fresh deploy
            # may trigger a cold start, especially with --no-cpu-boost.
            local code
            for attempt in 1 2 3 4 5; do
              code=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$url" || echo "000")
              if [ "$code" = "$expected_code" ]; then
                echo "::notice::$name OK ($code) on attempt $attempt"
                return 0
              fi
              echo "::warning::$name attempt $attempt returned $code, retrying..."
              sleep $((attempt * 3))
            done
            echo "::error::$name FAILED — last code: $code, url: $url"
            REPORT="${REPORT}- **$name** returned \`$code\` (expected \`$expected_code\`) — $url\n"
            FAIL=1
          }

          check "API /health" "${API_URL}/health" 200
          check "API /ready" "${API_URL}/ready" 200
          check "Backoffice /" "$BACKOFFICE_URL" 200
          check "Participant /" "$PARTICIPANT_URL" 200

          {
            echo "fail=$FAIL"
            echo "report<<EOF"
            echo -e "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Fail the job (and the workflow) if any probe failed — matches the
          # spirit of the old uptime alert but keeps it inside the deploy run.
          exit $FAIL

      # ── Admin endpoint probe ──────────────────────────────────────────────
      # Authenticates as the seeded super-admin and hits every filter combo
      # on /admin/users, /admin/organizations, /admin/audit-logs, /admin/events.
      # Catches the class of bug the static index audit can't see:
      #   - single-filter "subset" queries that need a dedicated composite
      #     index (the Firestore emulator doesn't enforce composites, so
      #     these only show up in staging/prod).
      #   - Zod validation contract mismatches between the backoffice UI
      #     (e.g. date-only <input type="date">) and the API (full ISO
      #     datetime).
      # See the April 2026 /v1/admin/users?role=organizer incident for the
      # concrete bug class this guards against.
      - name: Probe admin endpoints
        id: admin-probe
        if: steps.probe.outputs.fail == '0'
        env:
          API_URL: ${{ needs.setup.outputs.api_url }}
          FIREBASE_API_KEY: ${{ needs.setup.outputs.firebase_api_key }}
          ADMIN_EMAIL: admin@teranga.dev
          ADMIN_PASSWORD: password123
        # Non-zero exit propagates failure up to the job, which triggers the
        # existing "File incident issue on failure" step below. `continue-on-
        # error` stays OFF so a 500 on an admin endpoint blocks the deploy
        # from being declared healthy.
        run: node scripts/smoke-probe-admin.mjs

      - name: File incident issue on failure
        # Triggers on EITHER the basic probe (health/ready/UIs) or the admin
        # probe failing. Admin-probe failures don't populate steps.probe.outputs,
        # so this relies on the `failure()` condition alone for that path —
        # the report body notes the admin probe explicitly and points at logs.
        if: failure() && (steps.probe.outputs.fail == '1' || steps.admin-probe.conclusion == 'failure')
        uses: actions/github-script@v7
        env:
          # Pass the probe report via an environment variable instead of
          # GitHub Actions string interpolation. The report contains
          # backticks (e.g. "returned `503`") which, when spliced directly
          # into a JS template literal via ${{ }}, break the surrounding
          # string and produce "SyntaxError: Unexpected number" at
          # evaluation time. Reading it from process.env inside the script
          # body keeps it as an opaque string.
          REPORT: ${{ steps.probe.outputs.report }}
          ADMIN_PROBE_STATUS: ${{ steps.admin-probe.conclusion }}
        with:
          script: |
            const sha = context.sha;
            const basicReport = process.env.REPORT || "";
            const adminStatus = process.env.ADMIN_PROBE_STATUS || "skipped";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[smoke-test] Post-deploy probe failed on ${sha.slice(0, 7)}`;
            const sections = [
              `Staging deploy of ${sha} completed, but the post-deploy smoke test found one or more endpoints unhealthy.`,
              "",
            ];
            if (basicReport.trim()) {
              sections.push("### Basic probes (health, readiness, UIs)", basicReport, "");
            }
            if (adminStatus === "failure") {
              sections.push(
                "### Admin probes",
                "- The admin endpoint probe (scripts/smoke-probe-admin.mjs) failed.",
                "- Typical root causes: missing Firestore composite index (500), Zod validation contract mismatch with the backoffice UI (400), or a broken seeded super-admin persona.",
                "- Exact endpoints + HTTP codes are in the `Probe admin endpoints` step logs.",
                "",
              );
            }
            sections.push(`Run: ${runUrl}`, "", "_Auto-filed by the smoke-test job in `deploy-staging.yml`. Close once the incident is resolved._");
            const body = sections.join("\n");

            // De-dupe: if an open incident issue already exists, comment on it instead.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "smoke-test,incident",
              per_page: 5,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["smoke-test", "incident"],
              });
            }
