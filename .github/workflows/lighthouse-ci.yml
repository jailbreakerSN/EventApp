name: Lighthouse CI

# T4.4 / Sprint-1 B1 — Formal Lighthouse gate for the back-office +
# participant apps.
#
# Runs on pull requests that touch either web app plus a weekly cron so
# regressions from dependency bumps / Next.js upgrades are caught even
# without an explicit UI PR.
#
# Gate model (B1 closure of the Sprint-1 polish batch):
#  - Accessibility   ≥ 0.95  → ERROR (blocks the PR on regression)
#  - Best practices  ≥ 0.90  → ERROR
#  - SEO             ≥ 0.90  → ERROR
#  - Performance     ≥ 0.85  → WARN (CI hardware variability + cold-
#                              start penalties make perf a noisy
#                              metric for a binary gate; tightened on
#                              real CI baselines after one full
#                              cycle).
#
# `continue-on-error` is DROPPED — accessibility regressions are now
# blocking. If the gate becomes too noisy on perf flake re-instate
# only the perf job in advisory mode rather than re-disabling the
# whole workflow.
#
# Run manually via Actions UI or with:
#   gh workflow run lighthouse-ci.yml

on:
  pull_request:
    paths:
      - "apps/web-backoffice/**"
      - "apps/web-participant/**"
      - "packages/shared-ui/**"
      - ".github/workflows/lighthouse-ci.yml"
      - ".lighthouserc.json"
  schedule:
    # Monday 06:00 Africa/Dakar = 06:00 UTC (Dakar = UTC±0)
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    # B1 closure — accessibility / best-practices / SEO are now real
    # gates. Performance stays advisory inside `.lighthouserc.json`
    # via the `warn` level, so perf flakes don't block the PR while
    # we collect a stable baseline from CI hardware.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build shared-types
        run: npm run types:build

      # Next.js 15 needs at least stub values for any `NEXT_PUBLIC_*`
      # env vars the app imports at build time — missing values don't
      # crash the build but unset ones produce console errors Lighthouse
      # picks up and penalizes as Best Practices violations. We bake
      # localhost defaults so the build + subsequent start succeed
      # without secrets.
      - name: Build back-office
        run: npm run build --workspace=apps/web-backoffice
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_FIREBASE_API_KEY: lhci-stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: example.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: lhci-stub
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: lhci-stub
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: lhci-stub

      - name: Build participant
        run: npm run build --workspace=apps/web-participant
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_FIREBASE_API_KEY: lhci-stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: example.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: lhci-stub
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: lhci-stub
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: lhci-stub

      # Start servers as background processes in separate steps.
      # LHCI's `startServerCommand` only supports a single process;
      # launching both servers inline works around that limitation and
      # gives us clearer failure attribution (which server didn't come
      # up) in the workflow log.
      - name: Start back-office (background)
        run: |
          npm run start --workspace=apps/web-backoffice -- --port 3001 \
            > /tmp/lhci-backoffice.log 2>&1 &
          echo "$!" > /tmp/lhci-backoffice.pid

      - name: Start participant (background)
        run: |
          npm run start --workspace=apps/web-participant -- --port 3002 \
            > /tmp/lhci-participant.log 2>&1 &
          echo "$!" > /tmp/lhci-participant.pid

      - name: Wait for servers
        run: npx --yes wait-on@7 http://localhost:3001/login http://localhost:3002/ --timeout 60000

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun --config=.lighthouserc.json
        env:
          # LHCI_GITHUB_APP_TOKEN is optional — with it enabled the
          # workflow posts a status check with per-page scores. Without
          # it the workflow still runs, just without the annotation.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-server-logs
          path: |
            /tmp/lhci-backoffice.log
            /tmp/lhci-participant.log
          retention-days: 7
